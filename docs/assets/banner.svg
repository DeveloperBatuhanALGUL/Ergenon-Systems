<svg viewBox="0 0 900 140" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0f0e"/>
      <stop offset="100%" stop-color="#0d1a14"/>
    </linearGradient>
  </defs>
  <rect width="900" height="140" rx="10" fill="url(#bg)"/>
  <text x="450" y="55" font-family="monospace" font-size="34" fill="#E3D5C3" text-anchor="middle" font-weight="bold">
    ERGENON SYSTEMS
    <animate attributeName="opacity" values="0;1" dur="1.2s" fill="freeze"/>
  </text>
  <text x="450" y="90" font-family="monospace" font-size="16" fill="#6B2E2C" text-anchor="middle">
    <animate attributeName="opacity" values="0;0;1" dur="2.4s" fill="freeze"/>
    Flight Control &amp; Mission Computer
  </text>
  <text x="450" y="115" font-family="monospace" font-size="14" fill="#2F6F52" text-anchor="middle">
    <animate attributeName="opacity" values="0;0;0;1" dur="3.6s" fill="freeze"/>
    Running on TurkOS-Ergenon
  </text>
  <line x1="120" y1="130" x2="780" y2="130" stroke="#6B2E2C" stroke-width="2">
    <animate attributeName="x2" values="120;780" dur="3s" fill="freeze"/>
  </line>
</svg>
